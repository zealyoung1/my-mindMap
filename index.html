<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>思维导图</title>
  
  <style>
    /* ===== Design System Tokens ===== */
    :root {
      --bg-canvas: #f5f3ef;
      --bg-canvas-dot: #d8d4cc;
      --toolbar-bg: rgba(255,255,255,0.82);
      --toolbar-border: rgba(0,0,0,0.06);
      --toolbar-shadow: 0 1px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.08);
      --surface: #ffffff;
      --surface-hover: #f8f7f4;
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.14);
      --text-primary: #1a1a2e;
      --text-secondary: #5c5c7a;
      --text-muted: #9e9eb8;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-bg: #ede9fe;
      --accent-hover: #5a4bd1;
    --accent-glow: rgba(108,92,231,0.25);
    --danger: #e74c5e;
    --danger-bg: #fef2f2;
    --success: #2ecc71;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10), 0 0 1px rgba(0,0,0,0.06);
    --shadow-node: 0 2px 6px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
    --shadow-node-hover: 0 6px 20px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
    --transition-smooth: 0.25s cubic-bezier(0.4,0,0.2,1);
    --transition-spring: 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* 分支颜色调色板 */
  .branch-color-0 { --branch: #6c5ce7; --branch-bg: #ede9fe; --branch-border: #c4b5fd; }
  .branch-color-1 { --branch: #00b894; --branch-bg: #d1fae5; --branch-border: #6ee7b7; }
  .branch-color-2 { --branch: #e17055; --branch-bg: #fee2e2; --branch-border: #fca5a5; }
  .branch-color-3 { --branch: #0984e3; --branch-bg: #dbeafe; --branch-border: #93c5fd; }
  .branch-color-4 { --branch: #fdcb6e; --branch-bg: #fef3c7; --branch-border: #fcd34d; }
  .branch-color-5 { --branch: #e84393; --branch-bg: #fce7f3; --branch-border: #f9a8d4; }
  .branch-color-6 { --branch: #00cec9; --branch-bg: #ccfbf1; --branch-border: #5eead4; }
  .branch-color-7 { --branch: #636e72; --branch-bg: #f1f5f9; --branch-border: #cbd5e1; }

    /* ===== Animations ===== */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-node-hover); } 50% { box-shadow: 0 0 0 5px var(--accent-glow), var(--shadow-node-hover); } }
    @keyframes badgePulse { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.1); } }

    /* ===== Base ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; background: var(--bg-canvas); -webkit-font-smoothing: antialiased; touch-action: manipulation; overscroll-behavior: none; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ===== Toolbar ===== */
    .toolbar {
      height: 52px; background: var(--toolbar-bg);
      backdrop-filter: blur(20px) saturate(1.6); -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--toolbar-border);
      display: flex; align-items: center; padding: 0 20px; gap: 6px;
      box-shadow: var(--toolbar-shadow); position: relative; z-index: 100; flex-shrink: 0;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .toolbar button {
      padding: 7px 14px; border: none; border-radius: var(--radius-sm);
      background: transparent; color: var(--text-secondary); font-size: 13px;
      font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all var(--transition-fast); position: relative;
      letter-spacing: 0.01em;
    }
    .toolbar button:hover {
      background: var(--surface); color: var(--text-primary);
      box-shadow: var(--shadow-xs);
    }
    .toolbar button:active {
      transform: scale(0.96); background: var(--surface-hover);
    }
    .toolbar button .btn-emoji { font-size: 15px; line-height: 1; }
    .toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* ===== Canvas ===== */
    .canvas-container {
      flex: 1; overflow: hidden; position: relative; cursor: grab;
      background-color: var(--bg-canvas);
      background-image: radial-gradient(circle, var(--bg-canvas-dot) 0.8px, transparent 0.8px);
      background-size: 24px 24px;
      touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    .canvas-container.panning { cursor: grabbing; }
    .canvas-content { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    .svg-layer { position: absolute; top: 0; left: 0; width: 1px; height: 1px; overflow: visible; pointer-events: none; }
    .node-layer { position: absolute; top: 0; left: 0; }

    /* ===== Mind Nodes ===== */
    .mind-node {
      position: absolute; padding: 8px 16px; border-radius: var(--radius-sm);
      border: none; background: var(--surface); cursor: pointer;
      min-width: 60px; font-size: 14px; color: var(--text-primary);
      user-select: none; touch-action: none; -webkit-touch-callout: none;
      box-shadow: var(--shadow-node);
      transition: box-shadow var(--transition-smooth), transform var(--transition-fast), background var(--transition-fast);
      display: flex; align-items: center; gap: 6px;
    }
    .mind-node:hover {
      box-shadow: var(--shadow-node-hover);
      transform: translateY(-1px);
    }
    .mind-node.selected {
      animation: glowPulse 2s ease-in-out infinite;
      border-left: 3px solid var(--accent) !important;
    }
    .mind-node.root {
      font-size: 16px; font-weight: 600; padding: 12px 22px;
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      color: #fff; border: none;
      box-shadow: 0 4px 16px rgba(108,92,231,0.25), 0 0 0 1px rgba(108,92,231,0.1);
      border-radius: var(--radius-md);
    }
    .mind-node.root:hover {
      box-shadow: 0 6px 24px rgba(108,92,231,0.35), 0 0 0 1px rgba(108,92,231,0.15);
      transform: translateY(-2px);
    }
    .mind-node.root.selected {
      animation: glowPulse 2s ease-in-out infinite;
      border-left: none !important;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.4), 0 4px 16px rgba(108,92,231,0.3);
    }
    .mind-node.editing { cursor: text; outline: none; user-select: text; -webkit-user-select: text; touch-action: auto; }
    .mind-node .node-icon { font-size: 16px; flex-shrink: 0; }
    .mind-node .node-text { outline: none; min-width: 20px; white-space: nowrap; line-height: 1.5; }
    .mind-node .node-image {
      max-width: 120px; max-height: 80px; border-radius: 4px; object-fit: cover;
      flex-shrink: 0; cursor: pointer; border: 1px solid var(--border);
    }
    .mind-node .node-image { cursor: zoom-in; }
    .mind-node .node-icons { display: flex; gap: 4px; margin-left: 4px; flex-shrink: 0; }
    .mind-node .node-icons .icon-badge {
      width: 20px; height: 20px; border-radius: 6px;
      background: var(--accent-bg); display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--accent);
      transition: all var(--transition-fast);
    }
    .mind-node .node-icons .icon-badge:hover {
      background: var(--accent); color: #fff; transform: scale(1.1);
    }
    .mind-node.drag-over {
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-md) !important;
      border-left: 3px solid var(--accent) !important;
    }

    /* ===== Collapse Badge ===== */
    .collapse-badge {
      position: absolute; right: -14px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: 2px solid var(--surface); font-size: 10px; font-weight: 600;
      color: #fff; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 1;
      box-shadow: 0 2px 8px rgba(108,92,231,0.3);
      transition: all var(--transition-spring);
    }
    .collapse-badge:hover {
      animation: badgePulse 0.8s ease-in-out infinite;
      box-shadow: 0 3px 12px rgba(108,92,231,0.4);
    }

    /* ===== Context Menu ===== */
    /* ===== Action Bar (replaces context menu) ===== */
    .action-bar {
      display: none; position: fixed;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(24px) saturate(1.8); -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-radius: 28px; border: 1px solid var(--border);
      padding: 4px 6px; z-index: 1000;
      box-shadow: var(--shadow-lg);
      align-items: center; gap: 2px;
      white-space: nowrap;
    }
    .action-bar.show { display: flex; animation: slideDown var(--transition-smooth) ease-out; }
    .action-bar-item {
      padding: 8px 12px; font-size: 13px; font-weight: 500; color: var(--text-primary);
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      border-radius: 20px; transition: all var(--transition-fast);
      -webkit-tap-highlight-color: transparent; border: none; background: none;
      position: relative;
    }
    .action-bar-item:hover, .action-bar-item:active { background: var(--accent-bg); color: var(--accent); }
    .action-bar-item.disabled { color: var(--text-muted); pointer-events: none; opacity: 0.4; }
    .action-bar-item .ctx-emoji { font-size: 14px; }
    .action-bar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
    /* More submenu */
    .action-bar-more { position: relative; }
    .action-bar-sub {
      display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 6px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(24px) saturate(1.8); -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-radius: var(--radius-md); border: 1px solid var(--border);
      padding: 6px; min-width: 180px;
      box-shadow: var(--shadow-lg); z-index: 1001;
    }
    .action-bar-more.open .action-bar-sub { display: block; animation: slideDown var(--transition-smooth) ease-out; }
    .action-bar-sub-item {
      padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--text-primary);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      border-radius: var(--radius-sm); transition: all var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .action-bar-sub-item:hover, .action-bar-sub-item:active { background: var(--accent-bg); color: var(--accent); }
    .action-bar-sub-item.disabled { color: var(--text-muted); pointer-events: none; opacity: 0.4; }
    .action-bar-sub-item .ctx-emoji { font-size: 14px; width: 18px; text-align: center; }
    .action-bar-sub-sep { height: 1px; background: var(--border); margin: 4px 8px; }

    /* ===== Image Lightbox ===== */
    .lightbox-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000;
      align-items: center; justify-content: center;
      cursor: zoom-out; -webkit-tap-highlight-color: transparent;
    }
    .lightbox-overlay.show { display: flex; animation: fadeIn 0.2s ease-out; }
    .lightbox-overlay img {
      max-width: 90vw; max-height: 85vh; object-fit: contain;
      border-radius: var(--radius-md); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: #fff;
      font-size: 20px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }

    /* ===== Float Image ===== */
    .float-image {
      position: absolute; cursor: grab; z-index: 50;
      border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      border: 2px solid transparent; transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none; -webkit-user-select: none;
    }
    .float-image:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(108,92,231,0.2); }
    .float-image.drag-over-target { border-color: #e17055; box-shadow: 0 4px 20px rgba(225,112,85,0.3); }
    .float-image img { display: block; width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    .float-image .float-close {
      position: absolute; top: -8px; right: -8px; width: 20px; height: 20px;
      border-radius: 50%; background: #fff; border: 1px solid #ddd;
      font-size: 11px; cursor: pointer; display: none;
      align-items: center; justify-content: center; color: #666; z-index: 2;
    }
    .float-image:hover .float-close, .float-image:active .float-close { display: flex; }
    .float-image.dragging { cursor: grabbing; opacity: 0.7; }
    .float-image .float-resize {
      position: absolute; bottom: -4px; right: -4px; width: 14px; height: 14px;
      background: #fff; border: 1px solid #ccc; border-radius: 2px; cursor: nwse-resize;
      display: none; z-index: 2;
    }
    .float-image:hover .float-resize, .float-image:active .float-resize { display: block; }
    .float-image .float-toolbar {
      position: fixed; z-index: 9999; background: #fff; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18); white-space: nowrap; font-size: 12px;
      padding: 0; display: none;
    }
    .float-toolbar.visible { display: flex; }
    .float-toolbar span {
      padding: 6px 12px; cursor: pointer; color: #555; border-right: 1px solid #eee;
    }
    .float-toolbar span:last-child { border-right: none; }
    .float-toolbar span:hover { color: var(--accent); background: #f5f5f5; border-radius: 8px; }
    .float-image.selected { border-color: var(--accent); box-shadow: 0 4px 20px rgba(108,92,231,0.2); }
    .float-image.selected .float-resize { display: block; }
    .float-image.selected .float-close { display: flex; }

    /* ===== Modal ===== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(26,26,46,0.3);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; animation: fadeIn var(--transition-fast) ease-out; }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg); padding: 28px;
      min-width: 340px; max-width: 500px; max-height: 80vh; overflow-y: auto;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.04);
      animation: slideUp var(--transition-smooth) ease-out;
    }
    .modal h3 {
      font-size: 17px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .modal input[type="text"], .modal textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; color: var(--text-primary); outline: none; background: var(--bg-canvas);
      transition: all var(--transition-fast);
    }
    .modal input[type="text"]:focus, .modal textarea:focus {
      border-color: var(--accent); background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .modal-actions button {
      padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; background: var(--surface-hover); color: var(--text-secondary);
      transition: all var(--transition-fast);
    }
    .modal-actions button:hover { background: var(--surface); color: var(--text-primary); box-shadow: var(--shadow-xs); }
    .modal-actions button:active { transform: scale(0.97); }
    .modal-actions button.primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.25);
    }
    .modal-actions button.primary:hover {
      box-shadow: 0 4px 14px rgba(108,92,231,0.35); transform: translateY(-1px);
    }
    .modal-actions button.primary:active { transform: translateY(0) scale(0.97); }

    /* ===== Save List ===== */
    .save-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .save-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .save-item:hover { background: var(--accent-bg); border-color: var(--accent-light); }
    .save-item .save-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .save-item .save-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .save-item .save-delete {
      padding: 5px 10px; border: none; background: none; color: var(--danger); cursor: pointer;
      font-size: 12px; border-radius: 6px; font-weight: 500; transition: all var(--transition-fast);
    }
    .save-item .save-delete:hover { background: var(--danger-bg); }

    /* ===== Color Picker ===== */
    .color-picker-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .color-picker-row label { font-size: 13px; font-weight: 500; color: var(--text-secondary); min-width: 60px; }
    .color-picker-row input[type="color"] {
      width: 40px; height: 32px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; padding: 2px; transition: all var(--transition-fast);
    }
    .color-picker-row input[type="color"]:hover { border-color: var(--accent); transform: scale(1.05); }

    /* ===== Emoji Grid ===== */
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-bottom: 8px; }
    .emoji-item {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; border-radius: var(--radius-sm); cursor: pointer;
      border: 1.5px solid transparent; transition: all var(--transition-fast);
    }
    .emoji-item:hover {
      background: var(--accent-bg); border-color: var(--accent-light);
      transform: scale(1.12);
    }

    /* ===== Auto Save Hint ===== */
    #autoSaveHint {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2b55 100%) !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
    }

    /* ===== Search Panel ===== */
    .search-panel {
      display: none; position: fixed; top: 60px; right: 16px; width: 320px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-md); border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); z-index: 200; padding: 12px;
      animation: slideDown 0.2s ease-out;
    }
    .search-panel.show { display: block; }
    .search-input-wrap { display: flex; gap: 6px; margin-bottom: 8px; }
    .search-input-wrap input {
      flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; outline: none; transition: border-color var(--transition-fast);
    }
    .search-input-wrap input:focus { border-color: var(--accent); }
    .search-input-wrap button {
      padding: 8px 12px; border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 500;
    }
    .search-results { max-height: 280px; overflow-y: auto; }
    .search-result-item {
      padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
      color: var(--text-primary); transition: background var(--transition-fast);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .search-result-item:hover { background: var(--accent-bg); }
    .search-result-item .match { background: #fef08a; border-radius: 2px; padding: 0 2px; }
    .search-count { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .mind-node.search-highlight { box-shadow: 0 0 0 3px #fef08a, var(--shadow-node-hover) !important; }

    /* ===== Outline Panel ===== */
    .outline-panel {
      display: none; position: fixed; top: 60px; left: 16px; width: 280px; max-height: calc(100vh - 100px);
      background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-md); border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); z-index: 200; padding: 12px; overflow-y: auto;
      animation: slideDown 0.2s ease-out;
    }
    .outline-panel.show { display: block; }
    .outline-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .outline-item {
      padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text-primary);

<script>
// ===== 工具函数 =====
function uuid() {
  return 'xxxx-xxxx'.replace(/x/g, () => ((Math.random() * 16) | 0).toString(16));
}

// ===== 数据模型 =====
function createNode(text, side) {
  return {
    id: uuid(), text: text || '新节点', children: [], collapsed: false, side: side || 'right',
    style: { color: '#333', bgColor: '#fff', borderColor: '#d1d5db', icon: null, link: null, note: null, image: null }
  };
}

var state = {
  root: createNode('中心主题'), selectedId: null, currentFileName: null,
  undoStack: [], redoStack: [], pan: { x: 0, y: 0 }, zoom: 1,
  floatImages: [] // { id, src, x, y, w, h } 画布坐标，w/h 为显示宽高
};

// ===== 树操作 =====
function findNode(node, id) {
  if (node.id === id) return node;
  for (var i = 0; i < node.children.length; i++) {
    var found = findNode(node.children[i], id);
    if (found) return found;
  }
  return null;
}
function findParent(node, id, parent) {
  if (node.id === id) return parent || null;
  for (var i = 0; i < node.children.length; i++) {
    var found = findParent(node.children[i], id, node);
    if (found) return found;
  }
  return null;
}
function countDescendants(node) {
  var c = 0;
  for (var i = 0; i < node.children.length; i++) c += 1 + countDescendants(node.children[i]);
  return c;
}
function isDescendant(ancestorId, nodeId) {
  var a = findNode(state.root, ancestorId);
  return a ? findNode(a, nodeId) !== null : false;
}
function cloneTree(node) { return JSON.parse(JSON.stringify(node)); }

// ===== 布局引擎（中心辐射式） =====
var LAYOUT = { H_GAP: 50, V_GAP: 12, NODE_H: 40, ROOT_H: 48, PADDING_X: 100, PADDING_Y: 60 };

// 分支颜色调色板
var BRANCH_COLORS = ['#6c5ce7','#00b894','#e17055','#0984e3','#fdcb6e','#e84393','#00cec9','#636e72'];
var BRANCH_BG = ['#ede9fe','#d1fae5','#fee2e2','#dbeafe','#fef3c7','#fce7f3','#ccfbf1','#f1f5f9'];
var BRANCH_BORDER = ['#c4b5fd','#6ee7b7','#fca5a5','#93c5fd','#fcd34d','#f9a8d4','#5eead4','#cbd5e1'];

// 获取节点的分支索引（一级子节点的排列序号）
function getBranchIndex(node) {
  if (node === state.root) return -1;
  var parent = findParent(state.root, node.id);
  if (!parent) return 0;
  if (parent === state.root) {
    // 一级子节点：按在 root.children 中的位置
    var idx = parent.children.findIndex(function(c) { return c.id === node.id; });
    return idx >= 0 ? idx : 0;
  }
  // 非一级：递归找祖先的一级索引
  return getBranchIndex(parent);
}
// 获取节点的分支颜色
function getBranchColor(node, type) {
  if (node === state.root) return null;
  var idx = getBranchIndex(node) % BRANCH_COLORS.length;
  if (type === 'bg') return BRANCH_BG[idx];
  if (type === 'border') return BRANCH_BORDER[idx];
  return BRANCH_COLORS[idx];
}

function measureNodeHeight(node) {
  var el = document.querySelector('.mind-node[data-id="' + node.id + '"]');
  if (el) return el.offsetHeight;
  var isRoot = node === state.root;
  var lines = Math.max(1, Math.ceil(node.text.length / 18));
  var h = (isRoot ? LAYOUT.ROOT_H : LAYOUT.NODE_H) + (lines - 1) * 20;
  if (node.style.image) h = Math.max(h, 80); // 图片节点更高
  return h;
}
function measureNodeWidth(node) {
  var el = document.querySelector('.mind-node[data-id="' + node.id + '"]');
  if (el) return el.offsetWidth;
  var w = Math.max(80, Math.min(800, node.text.length * 14 + 40));
  if (node.style.image) w += 130; // 图片宽度 + 间距
  return w;
}
function computeSubtreeHeight(node) {
  if (node.collapsed || node.children.length === 0) return measureNodeHeight(node) + LAYOUT.V_GAP;
  var total = 0;
  for (var i = 0; i < node.children.length; i++) total += computeSubtreeHeight(node.children[i]);
  return Math.max(measureNodeHeight(node) + LAYOUT.V_GAP, total);
}

// direction: 1 = 向右展开, -1 = 向左展开
function layoutNode(node, x, yCenter, positions, direction) {
  var w = measureNodeWidth(node);
  var h = measureNodeHeight(node);
  // 向左展开时，节点右边缘对齐 x 位置
  var nodeX = direction === -1 ? x - w : x;
  positions[node.id] = { x: nodeX, y: yCenter - h / 2, width: w, height: h, dir: direction };
  if (node.collapsed || node.children.length === 0) return;
  // 子节点 x 位置：向右 = 当前节点右边缘 + H_GAP，向左 = 当前节点左边缘 - H_GAP
  var childX = direction === 1 ? nodeX + w + LAYOUT.H_GAP : nodeX - LAYOUT.H_GAP;
  var totalChildHeight = 0, childHeights = [];
  for (var i = 0; i < node.children.length; i++) {
    var ch = computeSubtreeHeight(node.children[i]);
    childHeights.push(ch); totalChildHeight += ch;
  }
  var currentY = yCenter - totalChildHeight / 2;
  for (var i = 0; i < node.children.length; i++) {
    layoutNode(node.children[i], childX, currentY + childHeights[i] / 2, positions, direction);
    currentY += childHeights[i];
  }
}

function computeLayout() {
  var positions = {};
  var root = state.root;
  var rw = measureNodeWidth(root);
  var rh = measureNodeHeight(root);

  // 根节点居中
  var centerX = 900, centerY = 500;
  positions[root.id] = { x: centerX - rw / 2, y: centerY - rh / 2, width: rw, height: rh, dir: 0 };

  if (root.collapsed || root.children.length === 0) return positions;

  // 按 side 字段分组，无 side 的默认右侧
  var rightChildren = [], leftChildren = [];
  for (var i = 0; i < root.children.length; i++) {
    var c = root.children[i];
    if (c.side === 'left') leftChildren.push(c);
    else rightChildren.push(c);
  }

  // 右侧子树
  if (rightChildren.length > 0) {
    var rightX = centerX + rw / 2 + LAYOUT.H_GAP;
    var totalRightH = 0, rightHeights = [];
    for (var i = 0; i < rightChildren.length; i++) {
      var ch = computeSubtreeHeight(rightChildren[i]);
      rightHeights.push(ch); totalRightH += ch;
    }
    var curY = centerY - totalRightH / 2;
    for (var i = 0; i < rightChildren.length; i++) {
      layoutNode(rightChildren[i], rightX, curY + rightHeights[i] / 2, positions, 1);
      curY += rightHeights[i];
    }
  }

  // 左侧子树
  if (leftChildren.length > 0) {
    var leftX = centerX - rw / 2 - LAYOUT.H_GAP;
    var totalLeftH = 0, leftHeights = [];
    for (var i = 0; i < leftChildren.length; i++) {
      var ch = computeSubtreeHeight(leftChildren[i]);
      leftHeights.push(ch); totalLeftH += ch;
    }
    var curY = centerY - totalLeftH / 2;
    for (var i = 0; i < leftChildren.length; i++) {
      layoutNode(leftChildren[i], leftX, curY + leftHeights[i] / 2, positions, -1);
      curY += leftHeights[i];
    }
  }

  return positions;
}

// ===== Toast 提示 =====
function toast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;z-index:999999;pointer-events:none;animation:toastIn 0.3s ease;';
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 1500);
  setTimeout(function() { t.remove(); }, 1800);
}

// ===== 渲染 =====
function render() {
  // 第一遍：渲染节点获取真实尺寸
  var positions = computeLayout();
  renderNodes(positions);

  // 等待 DOM 更新后，用真实尺寸重算布局
  requestAnimationFrame(function() {
    // 回写真实宽度
    var nodes = document.querySelectorAll('.mind-node');
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].dataset.id;
      if (positions[id]) {
        positions[id].width = nodes[i].offsetWidth;
        positions[id].height = nodes[i].offsetHeight;
      }
    }
    // 用真实尺寸重新计算布局
    var newPositions = computeLayout();
    // 更新节点位置
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].dataset.id;
      if (newPositions[id]) {
        nodes[i].style.left = newPositions[id].x + 'px';
        nodes[i].style.top = newPositions[id].y + 'px';
        newPositions[id].width = nodes[i].offsetWidth;
        newPositions[id].height = nodes[i].offsetHeight;
      }
    }
    // 画连线
    renderConnections(newPositions);
    // 渲染浮动图片
    renderFloatImages();
  });
  updateCanvasTransform();
  scheduleAutoSave();
  // 刷新大纲视图
  var outlinePanel = document.getElementById('outlinePanel');
  if (outlinePanel && outlinePanel.classList.contains('show')) renderOutline();
}

function renderNodes(positions) {
  var layer = document.getElementById('nodeLayer');
  layer.innerHTML = '';
  renderTree(state.root, positions);
}

function renderTree(node, positions) {
  var pos = positions[node.id];
  if (!pos) return;
  var el = document.createElement('div');
  el.className = 'mind-node' + (node === state.root ? ' root' : '') + (state.selectedId === node.id ? ' selected' : '');
  el.dataset.id = node.id;
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';

  if (node.style.icon) {
    var iconEl = document.createElement('span');
    iconEl.className = 'node-icon'; iconEl.textContent = node.style.icon; el.appendChild(iconEl);
  }
  if (node.style.image) {
    var imgEl = document.createElement('img');
    imgEl.className = 'node-image'; imgEl.src = node.style.image; imgEl.draggable = false;
    imgEl.alt = '图片';
    // 图片自定义鼠标拖拽（HTML5 Drag 对 <img> 不可靠）
    imgEl.addEventListener('mousedown', (function(nid, imgSrc) { return function(e) {
      if (e.button !== 0) return;
      e.stopPropagation(); e.preventDefault();
      var startX = e.clientX, startY = e.clientY, moved = false;
      var ghost = null;
      function onMove(ev) {
        var dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
          moved = true;
          // 创建跟随鼠标的幽灵图片
          ghost = document.createElement('img');
          ghost.src = imgSrc;
          ghost.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;width:80px;height:60px;object-fit:cover;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.3);opacity:0.85;left:' + (ev.clientX - 40) + 'px;top:' + (ev.clientY - 30) + 'px;';
          document.body.appendChild(ghost);
        }
        if (moved && ghost) {
          ghost.style.left = (ev.clientX - 40) + 'px';
          ghost.style.top = (ev.clientY - 30) + 'px';
        }
      }
      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (ghost) ghost.remove();
        if (!moved) {
          // 没有拖拽 → 点击放大
          showLightbox(imgSrc);
          return;
        }
        // 拖拽结束：检查落点
        var sourceNode = findNode(state.root, nid);
        if (!sourceNode || !sourceNode.style.image) return;
        var target = document.elementFromPoint(ev.clientX, ev.clientY);
        var targetNodeEl = target ? target.closest('.mind-node') : null;
        if (targetNodeEl) {
          var targetNid = targetNodeEl.dataset.id;
          var targetNode = findNode(state.root, targetNid);
          if (targetNode && targetNode !== sourceNode) {
            // 拖到其他节点 → 移动图片
            pushUndo();
            targetNode.style.image = sourceNode.style.image;
            sourceNode.style.image = null;
            render(); toast('图片已移动');
            return;
          }
        }
        // 拖到画布空白 → 创建浮动图片
        pushUndo();
        var ctnr = document.getElementById('canvasContainer');
        var rect = ctnr.getBoundingClientRect();
        var fx = (ev.clientX - rect.left - state.pan.x) / state.zoom - 60;
        var fy = (ev.clientY - rect.top - state.pan.y) / state.zoom - 40;
        var imgSrc = sourceNode.style.image;
        sourceNode.style.image = null;
        // 加载原始尺寸后创建浮动图片
        var tmpImg = new Image();
        tmpImg.onload = function() {
          var dw = tmpImg.naturalWidth, dh = tmpImg.naturalHeight;
          if (dw > 300) { dh = Math.round(dh * 300 / dw); dw = 300; }
          if (dh > 300) { dw = Math.round(dw * 300 / dh); dh = 300; }
          state.floatImages.push({ id: uuid(), src: imgSrc, x: fx, y: fy, w: dw, h: dh });
          render(); toast('图片已移到画布');
        };
        tmpImg.onerror = function() {
          state.floatImages.push({ id: uuid(), src: imgSrc, x: fx, y: fy, w: 120, h: 80 });
          render(); toast('图片已移到画布');
        };
        tmpImg.src = imgSrc;
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }; })(node.id, node.style.image));
    el.appendChild(imgEl);
  }
  var textEl = document.createElement('span');
  textEl.className = 'node-text'; textEl.textContent = node.text; el.appendChild(textEl);

  var iconsEl = document.createElement('span');
  iconsEl.className = 'node-icons';
  if (node.style.link) {
    var b = document.createElement('span'); b.className = 'icon-badge'; b.textContent = '\uD83D\uDD17';
    b.title = node.style.link;
    b.onclick = (function(url) { return function(e) { e.stopPropagation(); window.open(url, '_blank'); }; })(node.style.link);
    iconsEl.appendChild(b);
  }
  if (node.style.note) {
    var b2 = document.createElement('span'); b2.className = 'icon-badge'; b2.textContent = '\uD83D\uDCDD'; b2.title = node.style.note;
    b2.dataset.note = node.style.note;
    b2.onclick = (function(note) { return function(e) { e.stopPropagation(); showNoteViewer(note); }; })(node.style.note);
    iconsEl.appendChild(b2);
  }
  el.appendChild(iconsEl);

  el.style.color = node.style.color;
  if (node === state.root) {
    if (node.style.bgColor !== '#fff') {
      el.style.background = node.style.bgColor;
    }
  } else {
    // 分支配色：用户自定义颜色优先，否则用分支色
    var userCustomBg = node.style.bgColor !== '#fff';
    el.style.backgroundColor = userCustomBg ? node.style.bgColor : getBranchColor(node, 'bg');
    el.style.borderColor = (node.style.borderColor !== '#d1d5db') ? node.style.borderColor : getBranchColor(node, 'border');
    // 左侧加一条分支色竖线
    var branchColor = getBranchColor(node);
    if (branchColor && !el.classList.contains('selected')) {
      el.style.borderLeft = '3px solid ' + branchColor;
    }
  }

  if (node.collapsed && node.children.length > 0) {

function drawConnections(node, positions, svg) {
  if (node.collapsed || node.children.length === 0) return;

  for (var i = 0; i < node.children.length; i++) {
    var cp = positions[node.children[i].id];
    if (!cp) continue;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

    var y1 = pp.y + pp.height / 2, y2 = cp.y + cp.height / 2;
    var cx = (x1 + x2) / 2;
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + cx + ',' + y1 + ' ' + cx + ',' + y2 + ' ' + x2 + ',' + y2);

  document.addEventListener('dragover', function(e) { e.preventDefault(); });

// 将视图居中到根节点

// ===== 节点操作 =====

// 全局触摸双击检测（不受 render 销毁 DOM 影响）

// ===== 剪贴板 =====
var _clipboard = null; // { node: deepCopy, mode: 'copy'|'cut', sourceParentId: ... }

// ===== 操作栏 =====
function initActionBar() {
  // 点击空白关闭操作栏
  document.addEventListener('mousedown', function(e) {
    if (!e.target.closest('.action-bar')) hideActionBar();
  });
  document.addEventListener('touchstart', function(e) {

function showActionBar(node) {

  var moreWrap = document.getElementById('actionBarMore');
  moreWrap.classList.remove('open');

  // 根据节点状态更新 disabled
  var isRoot = node === state.root;
  bar.querySelector('[data-action="delete"]').classList.toggle('disabled', isRoot);
  bar.querySelector('[data-action="paste"]').classList.toggle('disabled', !_clipboard);
  bar.querySelector('[data-action="cut"]').classList.toggle('disabled', isRoot);
  bar.querySelector('[data-action="addSibling"]').classList.toggle('disabled', isRoot);
  bar.querySelector('[data-action="addChildLeft"]').classList.toggle('disabled', !isRoot);
  bar.querySelector('[data-action="clearImage"]').classList.toggle('disabled', !node.style.image);

  bar.classList.add('show');

  // 定位：在节点上方居中

  if (el) {
    var rect = el.getBoundingClientRect();
    var bw = bar.offsetWidth;
    var bx = rect.left + rect.width / 2 - bw / 2;
    var by = rect.top - 48;
    // 边界检查

function hideActionBar() {

function handleAction(action, node) {
  switch (action) {
    case 'cut':
      pushUndo();
      _clipboard = { node: JSON.parse(JSON.stringify(node)), mode: 'cut', sourceParentId: findParent(state.root, node.id)?.id };
      toast('已剪切');
      break;
    case 'copy':
      _clipboard = { node: JSON.parse(JSON.stringify(node)), mode: 'copy', sourceParentId: null };
      toast('已拷贝');
      break;
    case 'paste':
      if (!_clipboard) return;
      pushUndo();
      var pasted = JSON.parse(JSON.stringify(_clipboard.node));
      reassignIds(pasted);
      pasted.side = node.side || 'right';
      node.children.push(pasted);
      node.collapsed = false;
      if (_clipboard.mode === 'cut' && _clipboard.sourceParentId) {
        var sp = findNode(state.root, _clipboard.sourceParentId);
        if (sp) sp.children = sp.children.filter(function(c) { return c.id !== _clipboard.node.id; });
        _clipboard = null; // 剪切粘贴后清空
      }
      selectNode(pasted.id);
      toast('已粘贴');
      break;
    case 'delete':
      pushUndo(); deleteNode(node.id); hideActionBar(); break;
    case 'edit':
      startEdit(node.id); break;
    case 'addChildRight':
      pushUndo(); addChild(node.id, 'right'); break;
    case 'addChildLeft':
      pushUndo(); addChild(node.id, 'left'); break;
    case 'addSibling':
      pushUndo(); addSibling(node.id); break;
    case 'toggleCollapse':
      pushUndo(); toggleCollapse(node.id); break;
    case 'setColor':
      showColorModal(node.id); break;
    case 'setIcon':
      showIconModal(node.id); break;
    case 'setLink':
      showLinkModal(node.id); break;
    case 'setNote':
      showNoteModal(node.id); break;
    case 'setImage':
      showImageModal(node.id); break;
    case 'clearImage':
      pushUndo(); node.style.image = null; render(); break;
  }
  if (action !== 'edit' && action !== 'cut' && action !== 'copy') render();
}

// 重新分配 ID（粘贴时避免冲突）

}

  if (parent === state.root) {
    childSide = side || 'right';
  } else {
    childSide = parent.side || 'right';
  }
  var child = createNode('新节点', childSide); parent.children.push(child); parent.collapsed = false;
  selectNode(child.id); setTimeout(function() { startEdit(child.id); }, 50);
}
function addSibling(nodeId) {
  var parent = findParent(state.root, nodeId); if (!parent) return;
  var node = findNode(state.root, nodeId);
  var idx = parent.children.findIndex(function(c) { return c.id === nodeId; });
  var siblingSide = node ? (node.side || 'right') : 'right';
  var sibling = createNode('新节点', siblingSide); parent.children.splice(idx + 1, 0, sibling);
  selectNode(sibling.id); setTimeout(function() { startEdit(sibling.id); }, 50);
}
function deleteNode(nodeId) {
  if (nodeId === state.root.id) return;
  var parent = findParent(state.root, nodeId); if (!parent) return;
  parent.children = parent.children.filter(function(c) { return c.id !== nodeId; });
  state.selectedId = parent.id; render();
}
function toggleCollapse(nodeId) {
  var node = findNode(state.root, nodeId); if (!node) return;
  node.collapsed = !node.collapsed; render();
}
function startEdit(nodeId) {
  var el = document.querySelector('.mind-node[data-id="' + nodeId + '"] .node-text');
  if (!el) return;
  el.style.whiteSpace = 'pre-wrap'; // 编辑时允许换行

  var range = document.createRange(); range.selectNodeContents(el);
  var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);

    el.removeEventListener('blur', finishEdit); el.removeEventListener('keydown', handleEditKey); render();
  };

// ===== 拖拽 =====
function handleDrop(sourceId, targetId) {
  if (sourceId === targetId || isDescendant(sourceId, targetId) || sourceId === state.root.id) return;
  pushUndo();
  var sourceNode = findNode(state.root, sourceId);
  var sourceParent = findParent(state.root, sourceId);
  var targetNode = findNode(state.root, targetId);
  if (!sourceNode || !sourceParent || !targetNode) return;
  sourceParent.children = sourceParent.children.filter(function(c) { return c.id !== sourceId; });
  // 被拖拽的节点继承新父节点的方向
  if (targetNode === state.root) {
    sourceNode.side = sourceNode.side || 'right'; // 拖到根节点保持原方向
  } else {
    sourceNode.side = targetNode.side || 'right'; // 继承目标父节点方向
  }
  targetNode.children.push(sourceNode); targetNode.collapsed = false;

// ===== 触摸拖拽 =====
var _touchDrag = null; // { sourceId, type:'node'|'image', ghost, imgSrc }

function startTouchDrag(sourceId, type, imgSrc, pos) {
  var ghost = document.createElement('div');
  ghost.style.cssText = 'position:fixed;z-index:3000;pointer-events:none;opacity:0.85;transform:scale(0.9);transition:transform 0.1s;';
  if (type === 'image' && imgSrc) {
    ghost.innerHTML = '<img src="' + imgSrc + '" style="width:80px;height:54px;object-fit:cover;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.2);">';
  } else {
    var node = findNode(state.root, sourceId);
    ghost.innerHTML = '<div style="background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:6px 12px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.15);white-space:nowrap;">' + (node ? node.text : '节点') + '</div>';
  }
  ghost.style.left = (pos.x - 40) + 'px';
  ghost.style.top = (pos.y - 20) + 'px';
  document.body.appendChild(ghost);

  _touchDrag = { sourceId: sourceId, type: type, ghost: ghost, imgSrc: imgSrc };

  // 高亮源节点

  if (srcEl) srcEl.style.opacity = '0.4';
}

function moveTouchDrag(clientX, clientY) {
  if (!_touchDrag || !_touchDrag.ghost) return;
  _touchDrag.ghost.style.left = (clientX - 40) + 'px';
  _touchDrag.ghost.style.top = (clientY - 20) + 'px';

  // 高亮手指下的目标节点

  var target = document.elementFromPoint(clientX, clientY);
  _touchDrag.ghost.style.display = '';

    nodeEl.classList.add('drag-over');
  }
}

function endTouchDrag(sourceId, type) {
  if (!_touchDrag) return;
  var ghost = _touchDrag.ghost;
  // 找到手指下的目标节点

  var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  ghost.style.display = 'none';
  var target = document.elementFromPoint(cx, cy);
  ghost.style.display = '';

  var nodeEl = target ? target.closest('.mind-node') : null;
  var targetId = nodeEl ? nodeEl.dataset.id : null;

  // 清理
  document.querySelectorAll('.mind-node.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  document.querySelectorAll('.mind-node').forEach(function(el) { el.style.opacity = ''; });
  if (ghost.parentNode) ghost.parentNode.removeChild(ghost);

  // 执行操作
  if (targetId && targetId !== sourceId) {
    if (type === 'image') {
      var sourceNode = findNode(state.root, sourceId);
      var targetNode = findNode(state.root, targetId);
      if (sourceNode && targetNode && sourceNode.style.image) {
        pushUndo();
        targetNode.style.image = sourceNode.style.image;
        sourceNode.style.image = null;
        render();
        toast('图片已移到节点');
      }
    } else {
      handleDrop(sourceId, targetId);
      render();
    }
  } else if (type === 'image' && !targetId) {
    // 拖到空白画布 → 创建浮动图片
    var sourceNode = findNode(state.root, sourceId);

      pushUndo();
      var container = document.getElementById('canvasContainer');
      var cRect = container.getBoundingClientRect();
      var fx = (cx - cRect.left - state.pan.x) / state.zoom - 60;

        if (dh > 300) { dw = Math.round(dw * 300 / dh); dh = 300; }
        state.floatImages.push({ id: uuid(), src: imgSrc, x: fx, y: fy, w: dw, h: dh });
        render(); toast('图片已移到画布');
      };
      tmpImg.onerror = function() {
        state.floatImages.push({ id: uuid(), src: imgSrc, x: fx, y: fy, w: 120, h: 80 });
        render(); toast('图片已移到画布');
      };
      tmpImg.src = imgSrc;
    }
  }

  _touchDrag = null;
}

function cancelTouchDrag() {
  if (!_touchDrag) return;
  document.querySelectorAll('.mind-node.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  document.querySelectorAll('.mind-node').forEach(function(el) { el.style.opacity = ''; });
  if (_touchDrag.ghost && _touchDrag.ghost.parentNode) _touchDrag.ghost.parentNode.removeChild(_touchDrag.ghost);
  _touchDrag = null;

// ===== 撤销 =====

  state.redoStack = [];
}
function undo() { if (state.undoStack.length === 0) return; state.redoStack.push({ root: cloneTree(state.root), floatImages: JSON.parse(JSON.stringify(state.floatImages)) }); var s = state.undoStack.pop(); state.root = s.root; state.floatImages = s.floatImages || []; state.selectedId = null; render(); }

// ===== 搜索 =====
function toggleSearch() {

    document.getElementById('searchInput').focus();
  } else {
    clearSearchHighlight();
  }
}
function doSearch() {
  var query = document.getElementById('searchInput').value.trim().toLowerCase();
  var results = document.getElementById('searchResults');
  var countEl = document.getElementById('searchCount');
  results.innerHTML = '';
  clearSearchHighlight();
  if (!query) { countEl.textContent = ''; return; }
  var matches = [];
  searchTree(state.root, query, matches);
  countEl.textContent = '找到 ' + matches.length + ' 个结果';
  for (var i = 0; i < matches.length; i++) {
    (function(node) {
      var item = document.createElement('div');
      item.className = 'search-result-item';
      // 高亮匹配文字
      var text = node.text;
      var lowerText = text.toLowerCase();
      var idx = lowerText.indexOf(query);
      if (idx >= 0) {
        item.innerHTML = escapeHtml(text.substring(0, idx)) + '<span class="match">' + escapeHtml(text.substring(idx, idx + query.length)) + '</span>' + escapeHtml(text.substring(idx + query.length));
      } else {
        item.textContent = text;
      }
      item.onclick = function() { selectNode(node.id); scrollToNode(node.id); highlightSearchNode(node.id); };
      results.appendChild(item);
    })(matches[i]);
  }
  // 高亮所有匹配节点
  for (var i = 0; i < matches.length; i++) {
    var el = document.querySelector('.mind-node[data-id="' + matches[i].id + '"]');
    if (el) el.classList.add('search-highlight');
  }
}
function searchTree(node, query, results) {
  if (node.text.toLowerCase().indexOf(query) >= 0) results.push(node);
  for (var i = 0; i < node.children.length; i++) searchTree(node.children[i], query, results);
}
function clearSearchHighlight() {
  var els = document.querySelectorAll('.mind-node.search-highlight');
  for (var i = 0; i < els.length; i++) els[i].classList.remove('search-highlight');
}
function highlightSearchNode(nodeId) {

  if (el) { el.classList.remove('search-highlight'); void el.offsetWidth; el.classList.add('search-highlight'); }
}
function scrollToNode(nodeId) {

  var container = document.getElementById('canvasContainer');
  if (!el || !container) return;
  var left = parseInt(el.style.left), top = parseInt(el.style.top);
  var vw = container.clientWidth, vh = container.clientHeight;
  state.pan.x = vw / 2 - left - el.offsetWidth / 2;
  state.pan.y = vh / 2 - top - el.offsetHeight / 2;

}

}

// ===== 大纲视图 =====
function toggleOutline() {
  var panel = document.getElementById('outlinePanel');

function exportPNG() {
  try {
    var positions = computeLayout();
    // 用真实 DOM 尺寸更新
    var nodes = document.querySelectorAll('.mind-node');
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].dataset.id;
      if (positions[id]) { positions[id].width = nodes[i].offsetWidth; positions[id].height = nodes[i].offsetHeight; }
    }
    // 再次用真实尺寸重算布局
    positions = computeLayout();
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].dataset.id;
      if (positions[id]) { positions[id].width = nodes[i].offsetWidth; positions[id].height = nodes[i].offsetHeight; }
    }

    // 计算边界
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var id in positions) {
      var p = positions[id];
      if (p.x < minX) minX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.x + p.width > maxX) maxX = p.x + p.width;
      if (p.y + p.height > maxY) maxY = p.y + p.height;
    }
    // 浮动图片也纳入边界
    for (var fi = 0; fi < state.floatImages.length; fi++) {
      var fp = state.floatImages[fi];
      var fw = fp.w || 120, fh = fp.h || 80;
      if (fp.x < minX) minX = fp.x;
      if (fp.y < minY) minY = fp.y;
      if (fp.x + fw > maxX) maxX = fp.x + fw;
      if (fp.y + fh > maxY) maxY = fp.y + fh;
    }
    if (!isFinite(minX)) { toast('导出失败：画布为空'); return; }
    var pad = 60; minX -= pad; minY -= pad; maxX += pad; maxY += pad;
    var cropW = maxX - minX, cropH = maxY - minY;

    // 收集并预加载图片（带超时保护）
    var imageList = [];
    collectImages(state.root, imageList);
    // 也收集浮动图片
    for (var fi = 0; fi < state.floatImages.length; fi++) {
      imageList.push({ id: 'float_' + state.floatImages[fi].id, src: state.floatImages[fi].src });
    }

    preloadImages(imageList, function(loadedImages) {
      try {
        var canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(cropW * 2));
        canvas.height = Math.max(1, Math.round(cropH * 2));
        var ctx = canvas.getContext('2d');
        ctx.scale(2, 2);

        // 背景
        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0, 0, cropW, cropH);

        // 画连线
        drawConnectionsOnCanvas(ctx, state.root, positions, minX, minY);

        // 画节点
        drawNodesOnCanvas(ctx, state.root, positions, minX, minY, loadedImages);

        // 画浮动图片
        for (var fi = 0; fi < state.floatImages.length; fi++) {
          var fImg = state.floatImages[fi];
          var fImgObj = loadedImages['float_' + fImg.id];
          var fX = fImg.x - minX, fY = fImg.y - minY;
          var fW = fImg.w || 120, fH = fImg.h || 80;
          if (fImgObj) {
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 2;
            ctx.beginPath();
            if (ctx.roundRect) { ctx.roundRect(fX, fY, fW, fH, 8); } else { ctx.rect(fX, fY, fW, fH); }
            ctx.clip();
            ctx.drawImage(fImgObj, fX, fY, fW, fH);
            ctx.restore();
          } else {
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(fX, fY, 120, 80);
          }
        }

        // 导出
        var url = canvas.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = url;
        a.download = (state.currentFileName || '思维导图') + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        toast('导出成功');
      } catch(e) {
        toast('导出失败：' + e.message);
      }
    });
  } catch(e) {
    toast('导出失败：' + e.message);
  }
}

// 收集所有节点的图片
function collectImages(node, list) {
  if (node.style.image) {
    list.push({ id: node.id, src: node.style.image });
  }
  if (!node.collapsed) {
    for (var i = 0; i < node.children.length; i++) {
      collectImages(node.children[i], list);
    }
  }
}

// 预加载图片，回调返回 id→Image 映射（带超时保护）
function preloadImages(imageList, callback) {
  if (imageList.length === 0) { callback({}); return; }
  var loaded = {};
  var remaining = imageList.length;
  var called = false;
  function finish() {
    if (called) return; called = true; callback(loaded);
  }
  // 3秒超时，避免图片加载卡住
  setTimeout(finish, 3000);
  for (var i = 0; i < imageList.length; i++) {
    (function(item) {
      var img = new Image();
      var itemDone = false;
      function markDone() {
        if (itemDone) return; itemDone = true;
        loaded[item.id] = img;
        remaining--;
        if (remaining === 0) finish();
      }
      img.onload = markDone;
      img.onerror = function() {
        if (itemDone) return; itemDone = true;
        remaining--;
        if (remaining === 0) finish();
      };
      img.src = item.src;
      // 如果图片已缓存，同步完成
      if (img.complete && img.naturalWidth > 0) markDone();
    })(imageList[i]);
  }
}

function drawConnectionsOnCanvas(ctx, node, positions, offsetX, offsetY) {
  if (node.collapsed || node.children.length === 0) return;
  var pp = positions[node.id];
  if (!pp) return;
  for (var i = 0; i < node.children.length; i++) {
    var cp = positions[node.children[i].id];
    if (!cp) continue;
    var dir = cp.dir || (cp.x >= pp.x ? 1 : -1);
    var x1, x2;
    if (dir === 1) { x1 = pp.x + pp.width; x2 = cp.x; }
    else { x1 = pp.x; x2 = cp.x + cp.width; }
    var y1 = pp.y + pp.height / 2, y2 = cp.y + cp.height / 2;
    var cx = (x1 + x2) / 2;
    ctx.beginPath();
    ctx.moveTo(x1 - offsetX, y1 - offsetY);
    ctx.bezierCurveTo(cx - offsetX, y1 - offsetY, cx - offsetX, y2 - offsetY, x2 - offsetX, y2 - offsetY);
    var bc = getBranchColor(node.children[i]);
    ctx.strokeStyle = bc ? (bc + '4D') : 'rgba(108,92,231,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    drawConnectionsOnCanvas(ctx, node.children[i], positions, offsetX, offsetY);
  }
}

function drawNodesOnCanvas(ctx, node, positions, offsetX, offsetY, loadedImages) {
  var p = positions[node.id];
  if (!p) return;
  var x = p.x - offsetX, y = p.y - offsetY, w = p.width, h = p.height;
  var isRoot = node === state.root;
  var r = isRoot ? 12 : 8;
  loadedImages = loadedImages || {};
  var iconOffset = node.style.icon ? 22 : 0;
  var textX = x + 16;
  var textY = y + h / 2;

  // 圆角矩形背景
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();

  if (isRoot) {
    var grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, '#6c5ce7'); grad.addColorStop(1, '#a29bfe');
    ctx.fillStyle = grad;
  } else {
    var userCustomBg = node.style.bgColor !== '#fff';
    ctx.fillStyle = userCustomBg ? node.style.bgColor : (getBranchColor(node, 'bg') || '#fff');
  }
  ctx.fill();

  // 边框
  if (!isRoot) {
    var userCustomBorder = node.style.borderColor !== '#d1d5db';
    ctx.strokeStyle = userCustomBorder ? node.style.borderColor : (getBranchColor(node, 'border') || '#d1d5db');
    ctx.lineWidth = 1;
    ctx.stroke();
    // 左侧分支色竖线
    var branchC = getBranchColor(node);
    if (branchC) {
      ctx.fillStyle = branchC;
      ctx.fillRect(x, y + r, 3, h - r * 2);
    }
  }

  // 阴影效果（简单模拟）
  ctx.shadowColor = isRoot ? 'rgba(108,92,231,0.25)' : 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = isRoot ? 12 : 6;
  ctx.shadowOffsetY = isRoot ? 4 : 2;
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // 图标
  if (node.style.icon) {
    ctx.font = '16px sans-serif';
    ctx.fillText(node.style.icon, textX, textY);
  }

  // 图片（使用预加载的 Image 对象）
  if (node.style.image) {
    var imgX = textX + iconOffset, imgY = y + 4, imgW = 60, imgH = 40;
    var imgObj = loadedImages[node.id];
    if (imgObj) {
      ctx.save();
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(imgX, imgY, imgW, imgH, 4); } else { ctx.rect(imgX, imgY, imgW, imgH); }
      ctx.clip();
      ctx.drawImage(imgObj, imgX, imgY, imgW, imgH);
      ctx.restore();
    } else {
      ctx.fillStyle = '#f3f4f6'; ctx.fillRect(imgX, imgY, imgW, imgH);
      ctx.fillStyle = '#9ca3af'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('🖼', imgX + imgW / 2, imgY + imgH / 2 + 4); ctx.textAlign = 'left';
    }
    textX += imgW + 6;
  }

  // 文字（如有图片则偏移）
  if (node.style.image && !node.text) {
    // 只有图片没有文字时不画文字
  } else if (node.style.image) {
    var imgY2 = y + 4 + 40 + 4;
    ctx.fillStyle = isRoot ? '#fff' : (node.style.color || '#333');
    ctx.font = isRoot ? '600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' : '13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(node.text, x + 16, imgY2);
    ctx.textBaseline = 'middle';
  } else {
    ctx.fillStyle = isRoot ? '#fff' : (node.style.color || '#333');
    ctx.font = isRoot ? '600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' : '14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.text, textX + iconOffset, textY);
  }

  // 折叠标记
  if (node.collapsed && node.children.length > 0) {
    ctx.fillStyle = 'rgba(108,92,231,0.1)';
    ctx.beginPath();
    ctx.arc(x + w - 8, y + h / 2, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6c5ce7';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('+' + countDescendants(node), x + w - 8, y + h / 2 + 1);
    ctx.textAlign = 'left';
  }

  // 递归子节点
  if (!node.collapsed) {
    for (var i = 0; i < node.children.length; i++) {
      drawNodesOnCanvas(ctx, node.children[i], positions, offsetX, offsetY, loadedImages);
    }
  }
}

// ===== 本地存储 =====
function showSaveModal() {
  var modal = document.getElementById('saveModal'), input = document.getElementById('saveNameInput');
  input.value = state.currentFileName || new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');
  modal.classList.add('show'); input.focus(); input.select();
  document.getElementById('saveConfirmBtn').onclick = function() { var name = input.value.trim(); if (!name) return; saveToLocal(name); modal.classList.remove('show'); };
  document.getElementById('saveCancelBtn').onclick = function() { modal.classList.remove('show'); };
}
function saveToLocal(name) {
  try {
    var data = { name: name, savedAt: new Date().toISOString(), root: state.root, floatImages: state.floatImages };
    var json = JSON.stringify(data);
    // 检查 localStorage 容量（约 5MB）
    var used = 0;
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k) used += (localStorage.getItem(k) || '').length;
    }
    if (used + json.length > 4.5 * 1024 * 1024) {
      alert('存储空间不足，请删除一些旧文件后再保存。\n当前已用约 ' + (used / 1024 / 1024).toFixed(1) + 'MB');
      return;
    }
    localStorage.setItem('mindmap_' + name, json);
    state.currentFileName = name; showAutoSaveHint('已保存');
    // 手动保存成功后更新自动保存
    var aData = { name: name, savedAt: new Date().toISOString(), root: state.root, pan: state.pan, zoom: state.zoom };
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(aData));
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      alert('存储空间已满，请删除一些旧文件后再保存。');
    } else {
      alert('保存失败：' + e.message);
    }
  }
}
function showOpenModal() {
  var modal = document.getElementById('openModal'), list = document.getElementById('openList');
  list.innerHTML = ''; var saves = [];
  var usedBytes = 0;
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key.startsWith('mindmap_') && key !== AUTOSAVE_KEY) {
      try { var d = JSON.parse(localStorage.getItem(key)); if (d.name && d.name !== '__unsaved__') saves.push({ key: key, name: d.name, savedAt: d.savedAt }); } catch (e) {}
    }
    var val = localStorage.getItem(key);
    if (val) usedBytes += val.length * 2; // UTF-16 每字符 2 字节
  }
  saves.sort(function(a, b) { return new Date(b.savedAt) - new Date(a.savedAt); });
  // 容量提示
  var usedMB = (usedBytes / 1024 / 1024).toFixed(1);
  var header = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:var(--text-secondary);font-size:12px;"><span>共 ' + saves.length + ' 个文件</span><span>已用 ' + usedMB + ' MB / 5 MB</span></div>';
  if (saves.length === 0) { list.innerHTML = header + '<p style="color:#9ca3af;text-align:center;padding:20px;">暂无保存的思维导图</p>'; }
  else {
    list.innerHTML = header;
    for (var i = 0; i < saves.length; i++) {
      (function(save) {
        var item = document.createElement('div'); item.className = 'save-item';
        item.innerHTML = '<div><div class="save-name">' + save.name + '</div><div class="save-time">' + new Date(save.savedAt).toLocaleString('zh-CN') + '</div></div><button class="save-delete">删除</button>';
        item.querySelector('.save-delete').onclick = function(e) { e.stopPropagation(); if (confirm('确定删除"' + save.name + '"？')) { localStorage.removeItem(save.key); showOpenModal(); } };
        item.onclick = function() { loadFromLocal(save.key); modal.classList.remove('show'); };
        list.appendChild(item);
      })(saves[i]);
    }
  }
  modal.classList.add('show');
  document.getElementById('openCancelBtn').onclick = function() { modal.classList.remove('show'); };
}
function loadFromLocal(key) {
  try { var data = JSON.parse(localStorage.getItem(key)); pushUndo(); state.root = data.root; state.floatImages = migrateFloatImages(data.floatImages || []); state.currentFileName = data.name; state.selectedId = null; render(); requestAnimationFrame(fitView); } catch (e) { alert('加载失败'); }
}

// ===== 自动保存 =====
var autoSaveTimer = null;
var AUTOSAVE_KEY = 'mindmap_autosave';
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(function() {
    try {
      // 无论有没有文件名都保存
      var data = {
        name: state.currentFileName || '__unsaved__',
        savedAt: new Date().toISOString(),
        root: state.root,
        floatImages: state.floatImages,
        pan: state.pan, zoom: state.zoom
      };
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
      if (state.currentFileName) {
        // 同步更新手动存档（静默失败）
        try { localStorage.setItem('mindmap_' + state.currentFileName, JSON.stringify({ name: state.currentFileName, savedAt: new Date().toISOString(), root: state.root })); } catch (e) {}
      }
    } catch (e) {
      // 自动保存失败静默处理，不弹框打断用户
      console.warn('自动保存失败：', e.message);
    }
  }, 1500);
}
function loadAutoSave() {
  try {
    var raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (!data || !data.root) return false;
    state.root = data.root;
    state.floatImages = migrateFloatImages(data.floatImages || []);
    state.pan = data.pan || { x: 0, y: 0 };
    state.zoom = data.zoom || 1;
    if (data.name && data.name !== '__unsaved__') state.currentFileName = data.name;
    return true;
  } catch (e) { return false; }
}
function clearAutoSave() {
  localStorage.removeItem(AUTOSAVE_KEY);
}
function showAutoSaveHint(text) {
  var hint = document.getElementById('autoSaveHint');
  if (!hint) { hint = document.createElement('div'); hint.id = 'autoSaveHint'; hint.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:3000;transition:opacity 0.3s;'; document.body.appendChild(hint); }
  hint.textContent = text; hint.style.opacity = '1'; setTimeout(function() { hint.style.opacity = '0'; }, 2000);
}

  document.getElementById('noteTextarea').value = node.style.note || '';
  document.getElementById('noteModal').classList.add('show'); document.getElementById('noteTextarea').focus();
  document.getElementById('noteConfirmBtn').onclick = function() { pushUndo(); node.style.note = document.getElementById('noteTextarea').value.trim() || null; document.getElementById('noteModal').classList.remove('show'); render(); };
  document.getElementById('noteCancelBtn').onclick = function() { document.getElementById('noteModal').classList.remove('show'); };
  document.getElementById('noteClearBtn').onclick = function() { pushUndo(); node.style.note = null; document.getElementById('noteModal').classList.remove('show'); render(); };
}

// ===== 图片功能 =====
function showImageModal(nodeId) {
  var node = findNode(state.root, nodeId); if (!node) return;
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    compressAndSetImage(file, node);
  };
  input.click();
}

function compressAndSetImage(file, node) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxW = 400, quality = 0.7;
      var w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', quality);
      pushUndo(); node.style.image = dataUrl; render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 压缩图片并创建浮动图片
// 兼容旧数据：给没有 w/h 的浮动图片补默认值
function migrateFloatImages(arr) {
  if (!arr) return [];
  for (var i = 0; i < arr.length; i++) {
    if (!arr[i].w || !arr[i].h) { arr[i].w = 120; arr[i].h = 80; }
  }
  return arr;
}

function compressAndSetFloatImage(file, x, y) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxW = 400, quality = 0.7;
      var w = img.width, h = img.height;
      var origW = w, origH = h;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', quality);
      pushUndo();
      // 显示尺寸按比例缩放，最大宽 300
      var dispW = origW, dispH = origH;
      if (dispW > 300) { dispH = Math.round(dispH * 300 / dispW); dispW = 300; }
      if (dispH > 300) { dispW = Math.round(dispW * 300 / dispH); dispH = 300; }
      state.floatImages.push({ id: uuid(), src: dataUrl, x: x, y: y, w: dispW, h: dispH });
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 处理图片文件拖放到节点
function handleImageDrop(file, nodeId) {
  if (!file || !file.type.startsWith('image/')) return;
  var node = findNode(state.root, nodeId);
  if (!node) return;
  compressAndSetImage(file, node);
}

// 粘贴图片到选中节点
function initImagePaste() {
  document.addEventListener('paste', function(e) {
    if (!state.selectedId) return;
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.startsWith('image/')) {
        e.preventDefault();
        var file = items[i].getAsFile();
        var node = findNode(state.root, state.selectedId);
        if (node) compressAndSetImage(file, node);
        return;
      }
    }
  });
}

// ===== 图片放大查看 =====
function initLightbox() {
  var overlay = document.getElementById('lightbox');
  var closeBtn = overlay.querySelector('.lightbox-close');
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay || e.target === closeBtn) {
      overlay.classList.remove('show');
    }
  });
  closeBtn.addEventListener('click', function() { overlay.classList.remove('show'); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('show')) {
      overlay.classList.remove('show');
    }
  });
}

function showLightbox(src) {
  var overlay = document.getElementById('lightbox');
  var img = document.getElementById('lightboxImg');
  img.src = src;
  overlay.classList.add('show');
}

// ===== 备注查看弹窗 =====
function showNoteViewer(note) {
  var overlay = document.getElementById('noteViewOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'noteViewOverlay';
    overlay.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,26,46,0.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1500;align-items:center;justify-content:center;';
    var box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:16px;padding:24px;max-width:420px;width:90%;max-height:60vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);position:relative;';
    box.innerHTML = '<div style="font-weight:600;font-size:15px;margin-bottom:12px;color:#333;">📝 备注</div><div id="noteViewContent" style="font-size:14px;line-height:1.7;color:#555;white-space:pre-wrap;"></div><button style="position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:none;background:#f3f4f6;cursor:pointer;font-size:14px;color:#666;display:flex;align-items:center;justify-content:center;" onclick="document.getElementById(\'noteViewOverlay\').style.display=\'none\'">✕</button>';
    overlay.appendChild(box);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.style.display = 'none'; });
    document.body.appendChild(overlay);
  }
  document.getElementById('noteViewContent').textContent = note;
  overlay.style.display = 'flex';
}

// ===== 快捷键 =====
function initKeyboard() {
  document.addEventListener('keydown', function(e) {
    var isEditing = document.querySelector('.node-text[contenteditable="true"]');
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 's') { e.preventDefault(); if (state.currentFileName) saveToLocal(state.currentFileName); else showSaveModal(); }
      if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if ((e.key === 'z' && e.shiftKey) || e.key === 'y') { e.preventDefault(); redo(); }
      if (e.key === '0') { e.preventDefault(); fitView(); }
      if (e.key === 'f') { e.preventDefault(); toggleSearch(); }
      // 剪切/拷贝/粘贴快捷键
      if (e.key === 'x') { e.preventDefault(); var sn = findNode(state.root, state.selectedId); if (sn && sn !== state.root) { _clipboard = { node: JSON.parse(JSON.stringify(sn)), mode: 'cut', sourceParentId: findParent(state.root, sn.id)?.id }; toast('已剪切'); } }
      if (e.key === 'c') { e.preventDefault(); var sn2 = findNode(state.root, state.selectedId); if (sn2) { _clipboard = { node: JSON.parse(JSON.stringify(sn2)), mode: 'copy', sourceParentId: null }; toast('已拷贝'); } }
      if (e.key === 'v') { e.preventDefault(); if (_clipboard && state.selectedId) { var pn = findNode(state.root, state.selectedId); if (pn) { pushUndo(); var pasted = JSON.parse(JSON.stringify(_clipboard.node)); reassignIds(pasted); pasted.side = pn.side || 'right'; pn.children.push(pasted); pn.collapsed = false; if (_clipboard.mode === 'cut' && _clipboard.sourceParentId) { var sp = findNode(state.root, _clipboard.sourceParentId); if (sp) sp.children = sp.children.filter(function(c) { return c.id !== _clipboard.node.id; }); _clipboard = null; } selectNode(pasted.id); toast('已粘贴'); } } }
      return;
    }
    if (isEditing || !state.selectedId) return;
    switch (e.key) {
      case 'Tab': e.preventDefault(); pushUndo(); addChild(state.selectedId); break;
      case 'Enter': e.preventDefault(); pushUndo(); addSibling(state.selectedId); break;
      case 'Delete': case 'Backspace': e.preventDefault(); deleteNode(state.selectedId); break;
      case 'F2': e.preventDefault(); startEdit(state.selectedId); break;
      case 'ArrowUp': case 'ArrowDown': case 'ArrowLeft': case 'ArrowRight': e.preventDefault(); navigateNode(e.key); break;
    }
  });
}
function navigateNode(direction) {
  if (!state.selectedId) return;
  var node = findNode(state.root, state.selectedId), parent = findParent(state.root, state.selectedId);
  if (!node) return;
  var isLeftSide = node.side === 'left';
  // 右侧：右箭头=进入子节点，左箭头=回到父节点；左侧反之
  var expandKey = isLeftSide ? 'ArrowLeft' : 'ArrowRight';
  var collapseKey = isLeftSide ? 'ArrowRight' : 'ArrowLeft';
  switch (direction) {
    case 'ArrowRight': case 'ArrowLeft':
      if (direction === expandKey) {
        if (node.children.length > 0 && !node.collapsed) selectNode(node.children[0].id);
      } else if (direction === collapseKey) {
        if (parent) selectNode(parent.id);
      }
      break;
    case 'ArrowDown': if (parent) { var idx = parent.children.findIndex(function(c) { return c.id === state.selectedId; }); if (idx < parent.children.length - 1) selectNode(parent.children[idx + 1].id); } break;
    case 'ArrowUp': if (parent) { var idx2 = parent.children.findIndex(function(c) { return c.id === state.selectedId; }); if (idx2 > 0) selectNode(parent.children[idx2 - 1].id); } break;
  }
}

// ===== 模态框 overlay 关闭 =====
document.addEventListener('DOMContentLoaded', function() {
  var overlays = document.querySelectorAll('.modal-overlay');
  for (var i = 0; i < overlays.length; i++) {
    overlays[i].addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
  }
});

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', function() {
  initCanvas(); initToolbar(); initActionBar(); initKeyboard(); initImagePaste(); initLightbox();
  // 搜索事件
  document.getElementById('searchInput').addEventListener('input', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); if (e.key === 'Escape') { document.getElementById('searchPanel').classList.remove('show'); clearSearchHighlight(); } });
  document.getElementById('searchBtn').onclick = doSearch;
  // 启动时尝试恢复自动保存
  if (loadAutoSave()) {
    render();
    requestAnimationFrame(function() { fitView(); });
  } else {
    render();
    requestAnimationFrame(function() { fitView(); });
  }
  // 页面关闭/刷新前立即保存
  window.addEventListener('beforeunload', function() {
    var data = { name: state.currentFileName || '__unsaved__', savedAt: new Date().toISOString(), root: state.root, pan: state.pan, zoom: state.zoom };
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
  });
});
</script>
